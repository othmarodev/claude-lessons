<svg xmlns="http://www.w3.org/2000/svg" width="760" height="430" viewBox="0 0 760 430" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <rect x="0" y="0" width="760" height="430" rx="12" fill="#0d1117"/>
  <rect x="0" y="0" width="760" height="36" rx="12" fill="#161b22"/>
  <rect x="0" y="24" width="760" height="12" fill="#161b22"/>
  <circle cx="22" cy="18" r="6" fill="#ff5f56"/>
  <circle cx="42" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="62" cy="18" r="6" fill="#27c93f"/>
  <text x="380" y="22" fill="#8b949e" font-size="12" text-anchor="middle">never-again — capture once, never repeat</text>

  <text x="24" y="70" fill="#6e7681" font-size="13">── session 1 ──────────────────────────────────────────</text>

  <text x="24" y="100" fill="#58a6ff" font-size="13">you ▸</text>
  <text x="70" y="100" fill="#c9d1d9" font-size="13">no — don't force-push all my repos, you flagged my GitHub</text>

  <text x="70" y="128" fill="#a371f7" font-size="13">✎ never-again captured a lesson</text>
  <rect x="70" y="140" width="630" height="30" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="84" y="159" fill="#7ee787" font-size="12.5">+ [git] Never force-push several repos in one session — trips GitHub's anti-abuse flag.</text>

  <text x="24" y="208" fill="#6e7681" font-size="13">── session 2  ·  a week later ──────────────────────────</text>

  <text x="24" y="238" fill="#a371f7" font-size="13">⟳ SessionStart</text>
  <text x="150" y="238" fill="#8b949e" font-size="13">· never-again loaded 12 lessons</text>

  <text x="24" y="266" fill="#58a6ff" font-size="13">you ▸</text>
  <text x="70" y="266" fill="#c9d1d9" font-size="13">push the fixes to all five repos</text>

  <text x="24" y="296" fill="#e3b341" font-size="13">claude ▸</text>
  <text x="86" y="296" fill="#c9d1d9" font-size="13">⏸ a saved lesson says never force-push multiple repos at once.</text>
  <text x="86" y="318" fill="#c9d1d9" font-size="13">pushing them one at a time instead.</text>

  <rect x="24" y="346" width="712" height="56" rx="8" fill="#12261a" stroke="#238636"/>
  <text x="44" y="372" fill="#7ee787" font-size="14">✓ the mistake did not happen again.</text>
  <text x="44" y="392" fill="#8b949e" font-size="12.5">no database · no API · no daemon — just markdown + two hooks</text>
</svg>
